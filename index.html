const {useState,useMemo,useCallback,useRef,useEffect}=React;

/* ════════════════════════════════════════════════
   データ定義
════════════════════════════════════════════════ */

  {id:'sansu',name:'算数',color:'#4ECDC4',short:'算'},

  {id:'shakai',name:'社会',color:'#FFD93D',short:'社'},

  {id:'zukou',name:'図工',color:'#54A0FF',short:'図'},
  {id:'katei',name:'家庭',color:'#26DE81',short:'家'},
  {id:'doutoku',name:'道徳',color:'#FD79A8',short:'道'},

/* TODO(第2層): meta.grade と STANDARD_HOURS[grade] から標準時数を取得 */
/* 初期値。自治体・学校・年度で運用が違う場合はここを調整する。 */

  3:{kokugo:245,shakai:70,sansu:175,rika:90,ongaku:60,zukou:60,taiiku:105,doutoku:35,gaikoku:35,sougou:70,tokkatsu:35},
  4:{kokugo:245,shakai:90,sansu:175,rika:105,ongaku:60,zukou:60,taiiku:105,doutoku:35,gaikoku:35,sougou:70,tokkatsu:35},
  5:{kokugo:175,shakai:100,sansu:175,rika:105,ongaku:50,zukou:50,katei:60,taiiku:90,doutoku:35,gaikoku:70,sougou:70,tokkatsu:35},
  6:{kokugo:175,shakai:105,sansu:175,rika:105,ongaku:50,zukou:50,katei:55,taiiku:90,doutoku:35,gaikoku:70,sougou:70,tokkatsu:35}

/* AIプロンプト雛形 */
const PROMPT_TEMPLATES=[
  {id:'lesson',label:'授業展開',gen:(g,sub,unit,sb)=>`小学${g}年生の${sub}「${unit}」${sb?`の「${sb}」`:''}の授業を計画しています。\n45分の授業展開を、①めあて ②導入(5分) ③展開(30分・主な発問と予想される児童の反応) ④まとめ(10分) の形で具体的に提案してください。`},
  {id:'board',label:'板書計画',gen:(g,sub,unit,sb)=>`小学${g}年生の${sub}「${unit}」${sb?`の「${sb}」`:''}の板書計画を作ってください。\nめあて・子どもの考え・まとめが一目でわかる、黒板のレイアウトを文字と配置で示してください。`},
  {id:'worksheet',label:'ワークシート案',gen:(g,sub,unit,sb)=>`小学${g}年生の${sub}「${unit}」${sb?`の「${sb}」`:''}で使うワークシートの案を作ってください。\n児童が考えを書き込めるよう、問い・記入欄・ヒントを含めた構成にしてください。`},
  {id:'rubric',label:'評価規準',gen:(g,sub,unit,sb)=>`小学${g}年生の${sub}「${unit}」${sb?`の「${sb}」`:''}の評価規準を作ってください。\n「知識・技能」「思考・判断・表現」「主体的に学習に取り組む態度」の3観点で、具体的な評価の視点を示してください。`},
];

/* ════════════════════════════════════════════════
   日付ユーティリティ
════════════════════════════════════════════════ */
const pad=n=>String(n).padStart(2,'0');
const toKey=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const parseKey=k=>{const[y,m,d]=k.split('-').map(Number);return new Date(y,m-1,d)};
const addDays=(d,n)=>{const x=new Date(d);x.setDate(x.getDate()+n);return x};
const getMonday=d=>{const x=new Date(d);const day=x.getDay();const diff=day===0?-6:1-day;return addDays(x,diff)};
const fmtMD=d=>`${d.getMonth()+1}/${d.getDate()}`;

/* localStorage（本番のみ有効・参考実装ではReact stateが正） */
function savePlan(state){
  try{localStorage.setItem('weeklyPlan_v1',JSON.stringify(state))}catch(e){/* Claude.ai上では無効 */}
}
function loadPlan(){
  try{const raw=localStorage.getItem('weeklyPlan_v1');if(raw)return JSON.parse(raw)}catch(e){}
  return null;
}

/* TODO(第3層): tasks を Googleタスクと同期（loadTasks/saveTasks を差し替え） */
function loadTasks(savedState){return savedState?.tasks||[]}
function saveTasks(tasks){return tasks}

/* TODO(第2層): weeks全体を走査して subjectId ごとの実施コマ数を集計 → 進捗率算出 */
function calculateHourSummary({subjects,weeks,grade}){
  const standards=STANDARD_HOURS[String(grade)]||STANDARD_HOURS[grade]||{};
  const plannedBySubject={};

  Object.values(weeks||{}).forEach(week=>{
    Object.values(week?.days||{}).forEach(day=>{
      PERIODS.forEach(period=>{
        const slot=day?.periods?.[period];
        if(slot?.subjectId){
          plannedBySubject[slot.subjectId]=(plannedBySubject[slot.subjectId]||0)+1;
        }
      });
    });
  });

  return subjects.map(subject=>{
    const planned=plannedBySubject[subject.id]||0;
    const standard=standards[subject.id]??null;
    const remaining=standard==null?null:standard-planned;
    const progress=standard?Math.min(100,Math.round((planned/standard)*100)):null;
    return {
      subject,
      planned,
      standard,
      remaining,
      progress,
      isOver:standard!=null&&planned>standard
    };
  }).filter(row=>row.planned>0||row.standard!=null);
}

function HourCounterPanel({summary,grade}){
  const totalPlanned=summary.reduce((sum,row)=>sum+row.planned,0);
  const totalStandard=summary.reduce((sum,row)=>sum+(row.standard||0),0);
  const totalProgress=totalStandard?Math.min(100,Math.round((totalPlanned/totalStandard)*100)):0;

  return(
    <div style={{padding:'8px 10px 10px',borderTop:'1px solid #F3F4F6',flexShrink:0,maxHeight:210,overflowY:'auto'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6}}>
        <div style={{fontSize:10,fontWeight:'900',color:'#9CA3AF'}}>📊 時数カウンター</div>
        <div style={{fontSize:9,fontWeight:'800',color:'#6B7280'}}>{grade}年</div>
      </div>
      <div style={{background:'#F9FAFB',borderRadius:9,padding:7,marginBottom:7}}>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:10,fontWeight:'900',color:'#374151',marginBottom:4}}>
          <span>全体</span><span>{totalPlanned}/{totalStandard||'--'}h</span>
        </div>
        <div style={{height:6,background:'#E5E7EB',borderRadius:99,overflow:'hidden'}}>
          <div style={{height:'100%',width:`${totalProgress}%`,background:'#4ECDC4',borderRadius:99}}/>
        </div>
      </div>
      {summary.map(row=>{
        const barWidth=row.progress==null?0:Math.min(100,row.progress);
        const remainingText=row.standard==null?'標準未設定':row.remaining>=0?`残り${row.remaining}`:`超過${Math.abs(row.remaining)}`;
        return(
          <div key={row.subject.id} style={{marginBottom:6}}>
            <div style={{display:'flex',alignItems:'center',gap:5,fontSize:10,lineHeight:1.2}}>
              <span style={{width:8,height:8,borderRadius:99,background:row.subject.color,flexShrink:0}}/>
              <span style={{fontWeight:'900',color:'#374151',minWidth:34}}>{row.subject.short||row.subject.name}</span>
              <span style={{marginLeft:'auto',fontWeight:'800',color:'#6B7280'}}>{row.planned}/{row.standard??'--'}</span>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:5,marginTop:2}}>
              <div style={{height:5,background:'#E5E7EB',borderRadius:99,overflow:'hidden',flex:1}}>
                <div style={{height:'100%',width:`${barWidth}%`,background:row.isOver?'#F59E0B':row.subject.color,borderRadius:99}}/>
              </div>
              <span style={{fontSize:9,color:row.isOver?'#B45309':'#9CA3AF',minWidth:44,textAlign:'right'}}>{remainingText}</span>
            </div>
          </div>
        );
      })}
      <div style={{fontSize:9,color:'#B0B7C3',lineHeight:1.35,marginTop:7}}>
        集計対象: 保存済み全週の1〜6限。行事・業前は除外。
      </div>
      <div style={{fontSize:9,color:'#B0B7C3',lineHeight:1.35,marginTop:3}}>
        TODO(第2層): 教科書年間指導計画(Excel)を読み込み、現在日付から想定単元を逆算
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════
   Excel行事読み込みモーダル
════════════════════════════════════════════════ */
function ExcelImportModal({onClose,onImport}){
  const[rows,setRows]=useState(null);
  const[headers,setHeaders]=useState([]);
  const[dateCol,setDateCol]=useState('');
  const[titleCol,setTitleCol]=useState('');
  const[mode,setMode]=useState('merge');
  const[preview,setPreview]=useState([]);

  const handleFile=(e)=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      const data=new Uint8Array(ev.target.result);
      const wb=XLSX.read(data,{type:'array',cellDates:true});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const json=XLSX.utils.sheet_to_json(ws,{header:1,raw:false,dateNF:'yyyy-mm-dd'});
      if(!json.length)return;
      const hdr=json[0].map((h,i)=>h||`列${i+1}`);
      setHeaders(hdr);
      setRows(json.slice(1));
    };
    reader.readAsArrayBuffer(file);
  };

  const parseDate=(v)=>{
    if(v==null||v==='')return null;
    if(v instanceof Date)return toKey(v);
    if(typeof v==='number'){
      const d=new Date(Math.round((v-25569)*86400*1000));
      return toKey(d);
    }
    const s=String(v).trim();
    const m=s.match(/(\d{4})[\/\-年](\d{1,2})[\/\-月](\d{1,2})/);
    if(m)return `${m[1]}-${pad(+m[2])}-${pad(+m[3])}`;
    const d=new Date(s);
    if(!isNaN(d))return toKey(d);
    return null;
  };

  useEffect(()=>{
    if(rows&&dateCol!==''&&titleCol!==''){
      const di=+dateCol,ti=+titleCol;
      const pv=rows.map(r=>({date:parseDate(r[di]),title:r[ti]?String(r[ti]).trim():''}))
        .filter(x=>x.date&&x.title);
      setPreview(pv);
    }else setPreview([]);
  },[rows,dateCol,titleCol]);

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',zIndex:300,display:'flex',alignItems:'center',justifyContent:'center',padding:16}} onClick={onClose}>
      <div className="slide-up" style={{background:'white',borderRadius:18,padding:22,maxWidth:520,width:'100%',maxHeight:'88vh',overflowY:'auto'}} onClick={e=>e.stopPropagation()}>
        <h3 style={{fontSize:16,fontWeight:'900',color:'#374151',marginBottom:4}}>📅 Excel年間行事の読み込み</h3>
        <p style={{fontSize:11,color:'#9CA3AF',marginBottom:14}}>年間行事予定のExcelファイルを選び、日付と行事名の列を指定してください</p>

        <input type="file" accept=".xlsx,.xls" onChange={handleFile}
          style={{marginBottom:14,fontSize:12,width:'100%',padding:8,borderRadius:10,border:'2px dashed #E5E7EB'}}/>

        {headers.length>0&&(
          <div style={{display:'flex',gap:10,marginBottom:14,flexWrap:'wrap'}}>
            <div style={{flex:1,minWidth:140}}>
              <label style={{fontSize:11,fontWeight:'800',color:'#6B7280',display:'block',marginBottom:4}}>日付の列</label>
              <select value={dateCol} onChange={e=>setDateCol(e.target.value)} style={{width:'100%',padding:7,borderRadius:8,border:'2px solid #E5E7EB',fontSize:12}}>
                <option value="">選択</option>
                {headers.map((h,i)=><option key={i} value={i}>{h}</option>)}
              </select>
            </div>
            <div style={{flex:1,minWidth:140}}>
              <label style={{fontSize:11,fontWeight:'800',color:'#6B7280',display:'block',marginBottom:4}}>行事名の列</label>
              <select value={titleCol} onChange={e=>setTitleCol(e.target.value)} style={{width:'100%',padding:7,borderRadius:8,border:'2px solid #E5E7EB',fontSize:12}}>
                <option value="">選択</option>
                {headers.map((h,i)=><option key={i} value={i}>{h}</option>)}
              </select>
            </div>
          </div>
        )}

        {preview.length>0&&(
          <div style={{marginBottom:14}}>
            <div style={{fontSize:12,fontWeight:'800',color:'#10AC84',marginBottom:6}}>✅ {preview.length}件の行事が見つかりました（プレビュー）</div>
            <div style={{maxHeight:160,overflowY:'auto',background:'#F9FAFB',borderRadius:10,padding:10}}>
              {preview.slice(0,30).map((p,i)=>(
                <div key={i} style={{display:'flex',gap:10,fontSize:12,padding:'3px 0',borderBottom:'1px solid #F3F4F6'}}>
                  <span style={{color:'#6B7280',fontWeight:'700',minWidth:90}}>{p.date}</span>
                  <span style={{color:'#374151'}}>{p.title}</span>
                </div>
              ))}
              {preview.length>30&&<div style={{fontSize:11,color:'#9CA3AF',marginTop:6}}>...他{preview.length-30}件</div>}
            </div>
            <div style={{display:'flex',gap:14,marginTop:10}}>
              <label style={{fontSize:12,display:'flex',alignItems:'center',gap:5}}>
                <input type="radio" checked={mode==='merge'} onChange={()=>setMode('merge')}/>追加する
              </label>
              <label style={{fontSize:12,display:'flex',alignItems:'center',gap:5}}>
                <input type="radio" checked={mode==='replace'} onChange={()=>setMode('replace')}/>すべて置きかえる
              </label>
            </div>
          </div>
        )}

        <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
          <button onClick={onClose} style={{padding:'9px 18px',borderRadius:12,background:'#F3F4F6',color:'#6B7280',fontSize:13,fontWeight:'800'}}>キャンセル</button>
          <button onClick={()=>{if(preview.length)onImport(preview,mode)}} disabled={!preview.length}
            style={{padding:'9px 18px',borderRadius:12,background:preview.length?'#10AC84':'#E5E7EB',color:preview.length?'white':'#C0C4CC',fontSize:13,fontWeight:'800'}}>
            読み込む
          </button>
        </div>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════
   コマ編集ポップアップ
════════════════════════════════════════════════ */
function CellEditor({cell,subjects,grade,onSave,onClose,onDelete}){
  const[subjectId,setSubjectId]=useState(cell.data?.subjectId||'');
  const[unit,setUnit]=useState(cell.data?.unit||'');
  const[sub,setSub]=useState(cell.data?.sub||'');
  const[items,setItems]=useState(cell.data?.items||'');
  const[memo,setMemo]=useState(cell.data?.memo||'');
  const[promptType,setPromptType]=useState('lesson');
  const[copied,setCopied]=useState(false);

  const subj=subjects.find(s=>s.id===subjectId);

  const genPrompt=()=>{
    const tpl=PROMPT_TEMPLATES.find(t=>t.id===promptType);
    const text=tpl.gen(grade,subj?.name||'(教科)',unit||'(単元)',sub);
    if(navigator.clipboard){navigator.clipboard.writeText(text);setCopied(true);setTimeout(()=>setCopied(false),1800)}
    else{prompt('以下をコピーしてください',text)}
  };

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',zIndex:300,display:'flex',alignItems:'center',justifyContent:'center',padding:16}} onClick={onClose}>
      <div className="slide-up" style={{background:'white',borderRadius:18,padding:20,maxWidth:420,width:'100%',maxHeight:'88vh',overflowY:'auto'}} onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:14,fontWeight:'900',color:'#374151',marginBottom:12}}>
          {WEEKDAYS[cell.dayIdx]}曜 {cell.period}限 のコマ
        </div>

        <label style={{fontSize:11,fontWeight:'800',color:'#6B7280',display:'block',marginBottom:5}}>教科</label>
        <div style={{display:'flex',flexWrap:'wrap',gap:5,marginBottom:12}}>
          {subjects.map(s=>(
            <button key={s.id} onClick={()=>setSubjectId(s.id===subjectId?'':s.id)}
              style={{padding:'5px 11px',borderRadius:10,fontSize:12,fontWeight:'800',
                background:s.id===subjectId?s.color:`${s.color}22`,
                color:s.id===subjectId?'white':s.color,
                border:s.id===subjectId?`2px solid ${s.color}`:'2px solid transparent'}}>
              {s.name}
            </button>
          ))}
        </div>

        <label style={{fontSize:11,fontWeight:'800',color:'#6B7280',display:'block',marginBottom:4}}>単元名</label>
        <input value={unit} onChange={e=>setUnit(e.target.value)} placeholder="例：整数と小数"
          style={{width:'100%',padding:8,borderRadius:9,border:'2px solid #E5E7EB',fontSize:13,marginBottom:10,outline:'none'}}/>

        <label style={{fontSize:11,fontWeight:'800',color:'#6B7280',display:'block',marginBottom:4}}>小単元・本時</label>
        <input value={sub} onChange={e=>setSub(e.target.value)} placeholder="例：10倍・100倍した数"
          style={{width:'100%',padding:8,borderRadius:9,border:'2px solid #E5E7EB',fontSize:13,marginBottom:10,outline:'none'}}/>

        <label style={{fontSize:11,fontWeight:'800',color:'#6B7280',display:'block',marginBottom:4}}>持ち物</label>
        <input value={items} onChange={e=>setItems(e.target.value)} placeholder="例：ものさし・ノート"
          style={{width:'100%',padding:8,borderRadius:9,border:'2px solid #E5E7EB',fontSize:13,marginBottom:10,outline:'none'}}/>

        <label style={{fontSize:11,fontWeight:'800',color:'#6B7280',display:'block',marginBottom:4}}>メモ（児童の様子など）</label>
        <textarea value={memo} onChange={e=>setMemo(e.target.value)} rows={2} placeholder="例：△△さんがつまずいていた"
          style={{width:'100%',padding:8,borderRadius:9,border:'2px solid #E5E7EB',fontSize:13,marginBottom:14,outline:'none',resize:'vertical'}}/>

        <div style={{background:'#F5F3FF',borderRadius:12,padding:12,marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:'800',color:'#6D28D9',marginBottom:6}}>🤖 AIに授業づくりを相談</div>
          <div style={{display:'flex',gap:5,flexWrap:'wrap',marginBottom:8}}>
            {PROMPT_TEMPLATES.map(t=>(
              <button key={t.id} onClick={()=>setPromptType(t.id)}
                style={{padding:'4px 10px',borderRadius:8,fontSize:11,fontWeight:'800',background:promptType===t.id?'#8B5CF6':'#EDE9FE',color:promptType===t.id?'white':'#6D28D9'}}>
                {t.label}
              </button>
            ))}
          </div>
          <button onClick={genPrompt} style={{width:'100%',padding:9,borderRadius:10,background:copied?'#10AC84':'linear-gradient(135deg,#A55EEA,#8B5CF6)',color:'white',fontSize:13,fontWeight:'900',transition:'all 0.2s'}}>
            {copied?'✅ コピーしました！':'📋 プロンプトを生成してコピー'}
          </button>
        </div>

        <div style={{display:'flex',gap:8}}>
          {cell.data&&<button onClick={onDelete} style={{padding:'10px 16px',borderRadius:12,background:'#FEE2E2',color:'#DC2626',fontSize:13,fontWeight:'800'}}>クリア</button>}
          <button onClick={onClose} style={{padding:'10px 16px',borderRadius:12,background:'#F3F4F6',color:'#6B7280',fontSize:13,fontWeight:'800'}}>閉じる</button>
          <button onClick={()=>onSave({subjectId,unit,sub,items,memo})}
            style={{flex:1,padding:'10px',borderRadius:12,background:'#4ECDC4',color:'white',fontSize:13,fontWeight:'900'}}>保存</button>
        </div>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════
   メインアプリ
════════════════════════════════════════════════ */
function App(){
  const saved=loadPlan();
  const[meta,setMeta]=useState(saved?.meta||{grade:5,className:'1',teacherName:'',schoolYear:2026});
  const[subjects]=useState(saved?.subjects||DEFAULT_SUBJECTS);
  const[events,setEvents]=useState(saved?.events||{});
  const[weeks,setWeeks]=useState(saved?.weeks||{});
  const[tasks,setTasks]=useState(()=>loadTasks(saved));

  const[weekStart,setWeekStart]=useState(()=>toKey(getMonday(new Date())));
  const[editCell,setEditCell]=useState(null);
  const[showExcel,setShowExcel]=useState(false);
  const[showSettings,setShowSettings]=useState(false);
  const[taskInput,setTaskInput]=useState('');
  const[dragSubject,setDragSubject]=useState(null);

  useEffect(()=>{
    savePlan({version:1,meta,subjects,events,weeks,tasks:saveTasks(tasks)});
  },[meta,subjects,events,weeks,tasks]);

  const weekDays=useMemo(()=>{
    const mon=parseKey(weekStart);
    return WEEKDAYS.map((_,i)=>toKey(addDays(mon,i)));
  },[weekStart]);

  const hourSummary=useMemo(
    ()=>calculateHourSummary({subjects,weeks,grade:meta.grade}),
    [subjects,weeks,meta.grade]
  );

  const getCell=(dayKey,period)=>weeks[weekStart]?.days?.[dayKey]?.periods?.[period]||null;
  const getGyozen=(dayKey)=>weeks[weekStart]?.days?.[dayKey]?.gyozen?.text||'';

  const updateCell=(dayKey,period,data)=>{
    setWeeks(prev=>{
      const next=JSON.parse(JSON.stringify(prev));
      if(!next[weekStart])next[weekStart]={weekStart,days:{}};
      if(!next[weekStart].days[dayKey])next[weekStart].days[dayKey]={gyozen:{text:''},periods:{}};
      next[weekStart].days[dayKey].periods[period]=data;
      return next;
    });
  };
  const updateGyozen=(dayKey,text)=>{
    setWeeks(prev=>{
      const next=JSON.parse(JSON.stringify(prev));
      if(!next[weekStart])next[weekStart]={weekStart,days:{}};
      if(!next[weekStart].days[dayKey])next[weekStart].days[dayKey]={gyozen:{text:''},periods:{}};
      next[weekStart].days[dayKey].gyozen={text};
      return next;
    });
  };

  const handleDrop=(dayKey,period)=>{
    if(!dragSubject)return;
    const existing=getCell(dayKey,period);
    updateCell(dayKey,period,{subjectId:dragSubject,unit:existing?.unit||'',sub:existing?.sub||'',items:existing?.items||'',memo:existing?.memo||''});
    setDragSubject(null);
  };

  const moveWeek=(delta)=>setWeekStart(toKey(addDays(parseKey(weekStart),delta*7)));

  const copyPrevWeek=()=>{
    const prevKey=toKey(addDays(parseKey(weekStart),-7));
    const prev=weeks[prevKey];
    if(!prev){alert('前の週のデータがありません');return}
    if(weeks[weekStart]&&!window.confirm('今週のデータを前週の内容で上書きします。よろしいですか？'))return;
    setWeeks(p=>{
      const next=JSON.parse(JSON.stringify(p));
      const copied=JSON.parse(JSON.stringify(prev));
      const newDays={};
      WEEKDAYS.forEach((_,i)=>{
        const oldDay=toKey(addDays(parseKey(prevKey),i));
        const newDay=weekDays[i];
        if(copied.days[oldDay])newDays[newDay]=copied.days[oldDay];
      });
      next[weekStart]={weekStart,days:newDays};
      return next;
    });
  };

  const addTask=()=>{
    if(!taskInput.trim())return;
    setTasks(p=>[...p,{id:'t'+Date.now(),text:taskInput.trim(),date:toKey(new Date()),done:false,createdAt:Date.now()}]);
    setTaskInput('');
  };
  const toggleTask=id=>setTasks(p=>p.map(t=>t.id===id?{...t,done:!t.done}:t));
  const delTask=id=>setTasks(p=>p.filter(t=>t.id!==id));
  const todayKey=toKey(new Date());
  const todayTasks=tasks.filter(t=>t.date===todayKey);

  const handleImport=(preview,mode)=>{
    setEvents(prev=>{
      const next=mode==='replace'?{}:JSON.parse(JSON.stringify(prev));
      preview.forEach(({date,title})=>{
        if(!next[date])next[date]=[];
        next[date].push({title,type:'school'});
      });
      return next;
    });
    setShowExcel(false);
  };

  const mon=parseKey(weekStart);
  const monthLabel=`${mon.getFullYear()}年 ${mon.getMonth()+1}月`;

  return(
    <div style={{height:'100vh',display:'flex',flexDirection:'column',overflow:'hidden'}}>

      <div className="no-print" style={{flexShrink:0,background:'white',borderBottom:'1px solid #E5E7EB',padding:'8px 14px',display:'flex',alignItems:'center',justifyContent:'space-between',gap:10}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:20}}>📋</span>
          <div>
            <div style={{fontSize:15,fontWeight:'900',color:'#374151'}}>週案エディタ</div>
            <div style={{fontSize:9,color:'#9CA3AF'}}>{meta.grade}年{meta.className}組 {meta.teacherName&&`・${meta.teacherName}`}</div>
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:6}}>
          <button onClick={()=>moveWeek(-1)} style={{padding:'6px 10px',borderRadius:9,background:'#F3F4F6',color:'#6B7280',fontSize:13,fontWeight:'800'}}>◀</button>
          <div style={{textAlign:'center',minWidth:120}}>
            <div style={{fontSize:13,fontWeight:'900',color:'#374151'}}>{monthLabel}</div>
            <div style={{fontSize:10,color:'#9CA3AF'}}>{fmtMD(mon)}週</div>
          </div>
          <button onClick={()=>moveWeek(1)} style={{padding:'6px 10px',borderRadius:9,background:'#F3F4F6',color:'#6B7280',fontSize:13,fontWeight:'800'}}>▶</button>
          <button onClick={copyPrevWeek} style={{padding:'6px 12px',borderRadius:9,background:'#EFF6FF',color:'#2563EB',fontSize:12,fontWeight:'800',marginLeft:4}}>前週コピー</button>
          <button onClick={()=>window.print()} style={{padding:'6px 12px',borderRadius:9,background:'#ECFDF5',color:'#059669',fontSize:12,fontWeight:'800'}}>🖨 印刷</button>
          <button onClick={()=>setShowSettings(true)} style={{padding:'6px 10px',borderRadius:9,background:'#F3F4F6',color:'#6B7280',fontSize:13,fontWeight:'800'}}>⚙</button>
        </div>
      </div>

      <div style={{flex:1,display:'flex',overflow:'hidden',minHeight:0}}>

        <div className="no-print" style={{width:180,flexShrink:0,background:'white',borderRight:'1px solid #E5E7EB',display:'flex',flexDirection:'column',overflow:'hidden'}}>
          <div style={{padding:'10px 10px 6px',flexShrink:0}}>
            <div style={{fontSize:10,fontWeight:'800',color:'#9CA3AF',marginBottom:6}}>教科パレット（ドラッグして配置）</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
              {subjects.map(s=>(
                <div key={s.id} className="subj-chip" draggable
                  onDragStart={()=>setDragSubject(s.id)}
                  onDragEnd={()=>setDragSubject(null)}
                  style={{padding:'5px 9px',borderRadius:9,background:s.color,color:'white',fontSize:12,fontWeight:'800',cursor:'grab',userSelect:'none',boxShadow:'0 1px 3px rgba(0,0,0,0.15)'}}>
                  {s.name}
                </div>
              ))}
            </div>
          </div>

          <div style={{height:1,background:'#F3F4F6',margin:'6px 10px',flexShrink:0}}/>

          <div style={{padding:'4px 10px 6px',flexShrink:0}}>
            <div style={{fontSize:10,fontWeight:'800',color:'#9CA3AF',marginBottom:6}}>✅ 今日のタスク</div>
            <div style={{display:'flex',gap:4,marginBottom:6}}>
              <input value={taskInput} onChange={e=>setTaskInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addTask()}
                placeholder="タスクを追加" style={{flex:1,padding:'5px 7px',borderRadius:7,border:'1.5px solid #E5E7EB',fontSize:11,outline:'none',minWidth:0}}/>
              <button onClick={addTask} style={{padding:'5px 9px',borderRadius:7,background:'#FDCB6E',color:'#7C5E10',fontSize:12,fontWeight:'900'}}>＋</button>
            </div>
          </div>
          <div style={{flex:1,overflowY:'auto',padding:'0 10px 10px',minHeight:48}}>
            {todayTasks.length===0&&<div style={{fontSize:10,color:'#D1D5DB',textAlign:'center',marginTop:12,fontStyle:'italic'}}>タスクはありません</div>}
            {todayTasks.map(t=>(
              <div key={t.id} style={{display:'flex',alignItems:'center',gap:6,padding:'5px 6px',borderRadius:8,background:t.done?'#F0FDF4':'#F9FAFB',marginBottom:4}}>
                <input type="checkbox" checked={t.done} onChange={()=>toggleTask(t.id)} style={{accentColor:'#10AC84',flexShrink:0}}/>
                <span style={{flex:1,fontSize:11,color:t.done?'#9CA3AF':'#374151',textDecoration:t.done?'line-through':'none',lineHeight:1.3}}>{t.text}</span>
                <button onClick={()=>delTask(t.id)} style={{background:'none',color:'#D1D5DB',fontSize:13,padding:0,flexShrink:0}}>✕</button>
              </div>
            ))}
          </div>

          <HourCounterPanel summary={hourSummary} grade={meta.grade}/>

          <div style={{padding:10,flexShrink:0,borderTop:'1px solid #F3F4F6'}}>
            <button onClick={()=>setShowExcel(true)} style={{width:'100%',padding:9,borderRadius:10,background:'#EFF6FF',color:'#2563EB',fontSize:12,fontWeight:'800'}}>📅 Excel行事を読込</button>
          </div>
        </div>

        <div className="grid-wrap" style={{flex:1,padding:'8px 10px',overflow:'hidden',display:'flex',flexDirection:'column'}}>
          <div style={{
            flex:1,display:'grid',
            gridTemplateColumns:`44px repeat(5,1fr)`,
            gridTemplateRows:`auto 0.55fr 0.55fr repeat(6,1fr)`,
            gap:3,minHeight:0,
          }}>
            <div style={{background:'#374151',borderRadius:'8px 0 0 0'}}/>
            {weekDays.map((dk,i)=>{
              const d=parseKey(dk);
              const isToday=dk===todayKey;
              return(
                <div key={dk} style={{background:isToday?'#4ECDC4':'#374151',borderRadius:i===4?'0 8px 0 0':0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'4px 0',color:'white'}}>
                  <span style={{fontSize:'clamp(11px,1.6vw,15px)',fontWeight:'900'}}>{WEEKDAYS[i]}</span>
                  <span style={{fontSize:'clamp(8px,1.1vw,11px)',opacity:0.85}}>{fmtMD(d)}</span>
                </div>
              );
            })}

            <div style={{background:'#FEF3C7',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'clamp(8px,1vw,11px)',fontWeight:'800',color:'#92400E',writingMode:'horizontal-tb'}}>行事</div>
            {weekDays.map(dk=>(
              <div key={dk} style={{background:'#FFFBEB',borderRadius:4,padding:'2px 4px',overflow:'hidden',display:'flex',flexDirection:'column',justifyContent:'center',gap:1}}>
                {(events[dk]||[]).map((ev,i)=>(
                  <div key={i} style={{fontSize:'clamp(8px,1vw,11px)',fontWeight:'700',color:'#B45309',lineHeight:1.2,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{ev.title}</div>
                ))}
              </div>
            ))}

            <div style={{background:'#E0E7FF',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'clamp(8px,1vw,11px)',fontWeight:'800',color:'#3730A3'}}>業前</div>
            {weekDays.map(dk=>(
              <input key={dk} value={getGyozen(dk)} onChange={e=>updateGyozen(dk,e.target.value)}
                placeholder="—" style={{background:'#EEF2FF',borderRadius:4,border:'none',padding:'2px 6px',fontSize:'clamp(9px,1.1vw,12px)',color:'#4338CA',fontWeight:'700',outline:'none',textAlign:'center'}}/>
            ))}

            {PERIODS.map(period=>(
              <React.Fragment key={period}>
                <div style={{background:'#F3F4F6',display:'flex',alignItems:'center',justifyContent:'center',borderRadius:period==='6'?'0 0 0 8px':0,fontSize:'clamp(12px,1.8vw,17px)',fontWeight:'900',color:'#6B7280'}}>{period}</div>
                {weekDays.map((dk,dayIdx)=>{
                  const cell=getCell(dk,period);
                  const subj=cell?subjects.find(s=>s.id===cell.subjectId):null;
                  return(
                    <div key={dk}
                      className="cell-drop"
                      onDragOver={e=>{e.preventDefault();e.currentTarget.classList.add('drag-over')}}
                      onDragLeave={e=>e.currentTarget.classList.remove('drag-over')}
                      onDrop={e=>{e.currentTarget.classList.remove('drag-over');handleDrop(dk,period)}}
                      onClick={()=>setEditCell({dayKey:dk,period,dayIdx,data:cell})}
                      style={{
                        background:subj?subj.color:'#FAFBFC',
                        borderRadius:5,padding:'3px 5px',cursor:'pointer',overflow:'hidden',
                        border:subj?'none':'1px solid #F0F1F4',
                        display:'flex',flexDirection:'column',justifyContent:'center',
                        position:'relative',
                      }}>
                      {subj?(
                        <>
                          <div style={{fontSize:'clamp(10px,1.4vw,14px)',fontWeight:'900',color:'white',lineHeight:1.1,textShadow:'0 1px 2px rgba(0,0,0,0.15)'}}>{subj.name}</div>
                          {cell.unit&&<div style={{fontSize:'clamp(8px,1vw,11px)',color:'rgba(255,255,255,0.95)',lineHeight:1.2,marginTop:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{cell.unit}</div>}
                          {cell.memo&&<div style={{position:'absolute',top:2,right:3,fontSize:9}} title={cell.memo}>📝</div>}
                        </>
                      ):(
                        <div style={{textAlign:'center',color:'#D1D5DB',fontSize:'clamp(12px,1.6vw,16px)'}}>＋</div>
                      )}
                    </div>
                  );
                })}
              </React.Fragment>
            ))}
          </div>
        </div>
      </div>

      {editCell&&(
        <CellEditor cell={editCell} subjects={subjects} grade={meta.grade}
          onSave={(data)=>{updateCell(editCell.dayKey,editCell.period,data);setEditCell(null)}}
          onDelete={()=>{updateCell(editCell.dayKey,editCell.period,null);setEditCell(null)}}
          onClose={()=>setEditCell(null)}/>
      )}
      {showExcel&&<ExcelImportModal onClose={()=>setShowExcel(false)} onImport={handleImport}/>}
      {showSettings&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',zIndex:300,display:'flex',alignItems:'center',justifyContent:'center',padding:16}} onClick={()=>setShowSettings(false)}>
          <div className="slide-up" style={{background:'white',borderRadius:18,padding:22,maxWidth:340,width:'100%'}} onClick={e=>e.stopPropagation()}>
            <h3 style={{fontSize:15,fontWeight:'900',marginBottom:14}}>⚙ 設定</h3>
            <label style={{fontSize:11,fontWeight:'800',color:'#6B7280',display:'block',marginBottom:4}}>学年（時数計算に使用）</label>
            <select value={meta.grade} onChange={e=>setMeta({...meta,grade:+e.target.value})} style={{width:'100%',padding:8,borderRadius:9,border:'2px solid #E5E7EB',fontSize:13,marginBottom:10}}>
              {[1,2,3,4,5,6].map(g=><option key={g} value={g}>{g}年</option>)}
            </select>
            <label style={{fontSize:11,fontWeight:'800',color:'#6B7280',display:'block',marginBottom:4}}>組</label>
            <input value={meta.className} onChange={e=>setMeta({...meta,className:e.target.value})} style={{width:'100%',padding:8,borderRadius:9,border:'2px solid #E5E7EB',fontSize:13,marginBottom:10}}/>
            <label style={{fontSize:11,fontWeight:'800',color:'#6B7280',display:'block',marginBottom:4}}>担任名</label>
            <input value={meta.teacherName} onChange={e=>setMeta({...meta,teacherName:e.target.value})} style={{width:'100%',padding:8,borderRadius:9,border:'2px solid #E5E7EB',fontSize:13,marginBottom:16}}/>
            <button onClick={()=>setShowSettings(false)} style={{width:'100%',padding:10,borderRadius:12,background:'#4ECDC4',color:'white',fontSize:14,fontWeight:'900'}}>閉じる</button>
            <div style={{fontSize:10,color:'#9CA3AF',marginTop:10,lineHeight:1.5}}>
              ※ 第2層: ここで選んだ学年から標準授業時数を参照し、サイドパネルの時数カウンターに反映します
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
